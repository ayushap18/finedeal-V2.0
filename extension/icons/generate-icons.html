<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FineDeal Icon Generator</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 40px; text-align: center; }
    canvas { margin: 10px; border: 1px solid #333; }
    .row { margin: 20px 0; }
    a { color: #F97316; margin: 0 10px; }
  </style>
</head>
<body>
  <h1>FineDeal Icon Generator</h1>
  <p>Right-click each icon and "Save Image As" to the <code>icons/</code> folder.</p>

  <div class="row">
    <div>
      <canvas id="c16" width="16" height="16"></canvas>
      <p>icon-16.png</p>
    </div>
    <div>
      <canvas id="c48" width="48" height="48"></canvas>
      <p>icon-48.png</p>
    </div>
    <div>
      <canvas id="c128" width="128" height="128"></canvas>
      <p>icon-128.png</p>
    </div>
  </div>

  <div id="links"></div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      // Background rounded rect
      const r = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#F97316';
      ctx.fill();

      // Letter "F"
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `bold ${size * 0.6}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('F', size / 2, size / 2 + size * 0.03);

      // Download link
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `icon-${size}.png`;
      link.textContent = `Download icon-${size}.png`;
      document.getElementById('links').appendChild(link);
    }

    drawIcon('c16', 16);
    drawIcon('c48', 48);
    drawIcon('c128', 128);
  </script>
</body>
</html>
